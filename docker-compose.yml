services:
  freshrss-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: freshrss
      POSTGRES_USER: freshrss
      POSTGRES_PASSWORD: ${FRESHRSS_DB_PASSWORD}
    volumes:
      - freshrss-db-data:/var/lib/postgresql/data
    networks:
      - newsfeed
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "freshrss"]
      interval: 10s
      timeout: 5s
      retries: 5

  freshrss:
    image: freshrss/freshrss:latest
    restart: unless-stopped
    depends_on:
      freshrss-db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/Berlin}
      CRON_MIN: "*/15"
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
    networks:
      - newsfeed
    # Port 80 is NOT published — traffic arrives via nginx Proxy Manager only

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ./ntfy:/etc/ntfy
    networks:
      - newsfeed
    # Port 80 is NOT published — traffic arrives via nginx Proxy Manager only

volumes:
  freshrss-db-data:
  freshrss-data:
  freshrss-extensions:
  ntfy-data:

networks:
  newsfeed:
    driver: bridge
